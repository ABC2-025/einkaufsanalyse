*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f4f8;color:#1a2332}
.topbar{background:#1F4E79;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:700;white-space:nowrap}

.filters{display:flex;gap:6px;flex-wrap:wrap}
.filters label{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.15);border-radius:4px;padding:4px 8px;white-space:nowrap}
.filters input{cursor:pointer}
.container{padding:12px 16px;max-width:1400px;margin:0 auto}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.scard{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #dbe4ee}
.scard .label{font-size:10px;color:#607080;margin-bottom:2px}
.scard .value{font-size:18px;font-weight:700;color:#1F4E79}
.group-block{background:#fff;border-radius:8px;margin-bottom:8px;border:1px solid #dbe4ee;overflow:hidden}
.group-header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#2E75B6;color:#fff;cursor:pointer;user-select:none}
.group-header:hover{background:#1F4E79}
.group-toggle{font-size:14px;transition:transform .18s;flex-shrink:0}
.group-toggle.open{transform:rotate(90deg)}
.group-name{font-weight:700;font-size:12px;flex:1}
.group-meta{font-size:11px;opacity:.85;white-space:nowrap}
.group-body{display:none}
.group-body.open{display:block}
table{width:100%;border-collapse:collapse}
thead th{background:#EBF3FB;font-size:11px;font-weight:700;color:#1F4E79;padding:6px 8px;text-align:left;position:sticky;top:0;border-bottom:2px solid #B8CCE4;white-space:nowrap}
thead th.num{text-align:right}
tbody tr{border-bottom:1px solid #f0f4f8}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f6faff}
tbody td{padding:5px 8px;font-size:12px;vertical-align:middle}
tbody td.num{text-align:right;font-variant-numeric:tabular-nums;color:#2c3e50}
.name-cell{max-width:320px}
.badges{display:flex;gap:3px;flex-wrap:nowrap}
.badge{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;white-space:nowrap}
.badge.bio{background:#d4edda;color:#155724}
.badge.vegan{background:#fff3cd;color:#856404}
.badge.veg{background:#cce5ff;color:#004085}
.no-results{text-align:center;padding:40px;color:#607080;font-size:14px}
.sort-arrow{font-size:10px;opacity:.6;margin-left:3px}
thead th.sortable{cursor:pointer}
thead th.sortable:hover{background:#D6E8F8}
thead th.sorted{background:#C2D9F0;color:#0D3352}
tr.bio-row{background:#f8fff8}
tr.vegan-row{background:#fffef0}
tr.veg-row{background:#f0f6ff}
.group-count{background:rgba(255,255,255,.25);border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700}
</style>
</head>

function fmt(n,d=0){if(n==null||isNaN(n))return'–';return Number(n).toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtE(n){if(n==null||isNaN(n))return'–';return Number(n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'}
function fmtP(n){if(n==null||isNaN(n))return'–';return Number(n).toLocaleString('de-DE',{minimumFractionDigits:3,maximumFractionDigits:3})+' €'}

const totalSpend=DATA.reduce((s,g)=>s+g.total_spend,0);
const totalProducts=DATA.reduce((s,g)=>s+g.count,0);
const totalBio=DATA.reduce((s,g)=>s+g.articles.filter(a=>a.bio).length,0);
const totalVegan=DATA.reduce((s,g)=>s+g.articles.filter(a=>a.vegan).length,0);

document.getElementById('stats-bar').textContent=
  totalProducts+' Artikel · '+DATA.length+' Gruppen · '+fmtE(totalSpend)+' Gesamt 2025';

document.getElementById('summary-cards').innerHTML=`
  <div class="scard"><div class="label">Gesamtausgaben 2025</div><div class="value">${fmtE(totalSpend).replace(' €','')}&nbsp;€</div></div>
  <div class="scard"><div class="label">∅ pro Monat</div><div class="value">${fmtE(totalSpend/12).replace(' €','')}&nbsp;€</div></div>
  <div class="scard"><div class="label">Artikel gesamt</div><div class="value">${totalProducts}</div></div>
  <div class="scard"><div class="label">Produktgruppen</div><div class="value">${DATA.length}</div></div>
  <div class="scard"><div class="label">Bio-Artikel</div><div class="value">${totalBio}</div></div>
  <div class="scard"><div class="label">Vegane Artikel</div><div class="value">${totalVegan}</div></div>
`;

let sortState={};
let openGroups={};

function buildGroups(filteredData){
  const container=document.getElementById('groups-container');
  container.innerHTML='';
  let totalVisible=0;
  filteredData.forEach(g=>{
    if(g.articles.length===0)return;
    totalVisible+=g.articles.length;
    const key=g.gruppe;
    const block=document.createElement('div');
    block.className='group-block';
    const isOpen=openGroups[key]!==false;
    const spend=g.articles.reduce((s,a)=>s+a.spend,0);
    const kg=g.articles.reduce((s,a)=>s+a.kg,0);
    block.innerHTML=`
      <div class="group-header" onclick="toggleGroup('${key.replace(/'/g,"\'")}',this)">
        <span class="group-toggle${isOpen?' open':''}">&#9654;</span>
        <span class="group-name">${g.gruppe}</span>
        <span class="group-count">${g.articles.length}</span>
        <span class="group-meta">${fmt(kg,0)} kg&nbsp;·&nbsp;${fmtE(spend)}</span>
      </div>
      <div class="group-body${isOpen?' open':''}">
        ${buildTable(key,g.articles)}
      </div>
    `;
    container.appendChild(block);
  });
  document.getElementById('no-results').style.display=totalVisible===0?'block':'none';
}

function buildTable(key,articles){
  const s=sortState[key]||{col:'spend',dir:-1};
  const sorted=[...articles].sort((a,b)=>{
    let av=a[s.col]??0,bv=b[s.col]??0;
    if(typeof av==='string')return s.dir*(av.localeCompare(bv));
    return s.dir*(av-bv);
  });
  function th(col,label,cls=''){
    const isSorted=s.col===col;
    const arr=isSorted?(s.dir>0?'▲':'▼'):'';
    return`<th class="sortable${cls?' '+cls:''}${isSorted?' sorted':''}" onclick="sortTable('${key.replace(/'/g,"\'")}','${col}')">${label}${arr?`<span class="sort-arrow">${arr}</span>`:''}</th>`;
  }
  let rows=sorted.map(a=>{
    const badges=[];
    if(a.bio)badges.push('<span class="badge bio">Bio</span>');
    if(a.vegan)badges.push('<span class="badge vegan">Vegan</span>');
    else if(a.veg)badges.push('<span class="badge veg">Veg.</span>');
    const rowClass=a.bio?'bio-row':a.vegan?'vegan-row':a.veg?'veg-row':'';
    const preisStr=a.preis?fmtP(a.preis).replace(' €','')+'&nbsp;€/'+a.preis_einheit:'–';
    return`<tr class="${rowClass}">
      <td class="name-cell">${a.name}</td>
      <td>${a.einheit}</td>
      <td class="num">${preisStr}</td>
      <td class="num">${fmt(a.kg,0)}&nbsp;kg</td>
      <td class="num">${fmt(a.menge,0)}</td>
      <td class="num">${fmtE(a.spend)}</td>
      <td class="num">${fmt(a.mon_kg,0)}&nbsp;kg</td>
      <td class="num">${a.n}</td>
      <td>${badges.length?'<div class="badges">'+badges.join('')+'</div>':''}</td>
    </tr>`;
  }).join('');
  return`<table>
    <thead><tr>
      ${th('name','Artikel')}
      <th>Einheit</th>
      ${th('preis','∅ Preis','num')}
      ${th('kg','Jahres-kg','num')}
      ${th('menge','Jahres-Menge','num')}
      ${th('spend','Ausgaben','num')}
      ${th('mon_kg','∅/Monat','num')}
      <th class="num">Buchungen</th>
      <th>Labels</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function toggleGroup(key,header){
  const isOpen=openGroups[key]!==false;
  openGroups[key]=!isOpen;
  const toggle=header.querySelector('.group-toggle');
  const body=header.nextElementSibling;
  if(openGroups[key]){toggle.classList.add('open');body.classList.add('open')}
  else{toggle.classList.remove('open');body.classList.remove('open')}
}

function sortTable(key,col){
  const s=sortState[key]||{col:'spend',dir:-1};
  if(s.col===col){sortState[key]={col,dir:-s.dir}}
  else{sortState[key]={col,dir:-1}}
  applyFilters();
  openGroups[key]=true;
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const onlyBio=document.getElementById('f-bio').checked;
  const onlyVegan=document.getElementById('f-vegan').checked;
  const onlyVeg=document.getElementById('f-veg').checked;
  const filtered=DATA.map(g=>({
    ...g,
    articles:g.articles.filter(a=>{
      if(onlyBio&&!a.bio)return false;
      if(onlyVegan&&!a.vegan)return false;
      if(onlyVeg&&!a.veg&&!a.vegan)return false;
      if(q&&!a.name.toLowerCase().includes(q)&&!g.gruppe.toLowerCase().includes(q))return false;
      return true;
    })
  }));
  buildGroups(filtered);
}

applyFilters();
</script>
