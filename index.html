<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bestellanalyse Necta</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f4f8;color:#1a2332}
.topbar{background:#1F4E79;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar h1{font-size:14px;font-weight:700;white-space:nowrap;flex-shrink:0}
.tb-sep{width:1px;height:22px;background:rgba(255,255,255,.25);flex-shrink:0}
.search-wrap{flex:1;min-width:130px;max-width:260px}
.search-wrap input{width:100%;padding:5px 10px;border-radius:5px;border:none;font-size:12px;outline:none}
.period-group{display:flex;align-items:center;gap:4px;flex-shrink:0}
.period-label{font-size:10px;opacity:.7;white-space:nowrap}
.period-btns{display:flex;gap:3px;flex-wrap:wrap}
.pbtn{padding:3px 10px;border-radius:4px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .12s}
.pbtn:hover{background:rgba(255,255,255,.15)}
.pbtn.active{background:#fff;color:#1F4E79;border-color:#fff}
.chk-group{display:flex;gap:4px;flex-shrink:0}
.chk-group label{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.1);border-radius:4px;padding:3px 7px;border:1px solid rgba(255,255,255,.2)}
.chk-group label:hover{background:rgba(255,255,255,.2)}
.container{padding:10px 14px;max-width:1500px;margin:0 auto}
.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;margin-bottom:10px}
.sc{background:#fff;border-radius:7px;padding:9px 12px;border:1px solid #dbe4ee}
.sc .lbl{font-size:10px;color:#607080;margin-bottom:1px}
.sc .val{font-size:17px;font-weight:700;color:#1F4E79;line-height:1.2}
.sc .sub{font-size:10px;color:#8a9ab0;margin-top:1px}
.group-block{background:#fff;border-radius:7px;margin-bottom:6px;border:1px solid #dbe4ee;overflow:hidden}
.gh{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#2E75B6;color:#fff;cursor:pointer;user-select:none}
.gh:hover{background:#1F4E79}
.gt{font-size:11px;transition:transform .15s;flex-shrink:0}
.gt.open{transform:rotate(90deg)}
.gname{font-weight:700;font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gbadge{background:rgba(255,255,255,.2);border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700;flex-shrink:0}
.gmeta{font-size:11px;opacity:.85;white-space:nowrap;flex-shrink:0}
.gb{display:none}
.gb.open{display:block}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{background:#EBF3FB;font-size:11px;font-weight:700;color:#1F4E79;padding:5px 7px;text-align:left;border-bottom:2px solid #B8CCE4;white-space:nowrap;overflow:hidden}
thead th.r{text-align:right}
thead th.s{cursor:pointer}
thead th.s:hover{background:#D6E8F8}
thead th.sorted{background:#C2D9F0}
.sa{font-size:9px;margin-left:2px;opacity:.65}
tbody tr{border-bottom:1px solid #f0f4f8}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f2f7ff}
td{padding:4px 7px;font-size:12px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.r{text-align:right;font-variant-numeric:tabular-nums}
.badges{display:flex;gap:2px}
.b{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.b.bio{background:#d4edda;color:#155724}
.b.vegan{background:#fff3cd;color:#856404}
.b.veg{background:#cce5ff;color:#004085}
tr.br{background:#f6fff8}
tr.van{background:#fffef0}
tr.ve{background:#f0f6ff}
.no-res{text-align:center;padding:36px;color:#607080}
</style>
</head>
<body>
<div class="topbar">
  <h1>Bestellanalyse Necta</h1>
  <div class="tb-sep"></div>
  <div id="stats-top" style="font-size:11px;opacity:.8;white-space:nowrap"></div>
  <div class="tb-sep"></div>
  <div class="search-wrap"><input id="search" placeholder="Artikel suchen..." oninput="applyFilters()"></div>
  <div class="period-group">
    <span class="period-label">Zeitraum:</span>
    <div class="period-btns" id="period-btns"></div>
  </div>
  <div class="chk-group">
    <label><input type="checkbox" id="f-bio" onchange="applyFilters()"> Bio</label>
    <label><input type="checkbox" id="f-vegan" onchange="applyFilters()"> Vegan</label>
    <label><input type="checkbox" id="f-veg" onchange="applyFilters()"> Veg.</label>
  </div>
</div>

<div class="container">
  <div class="scards" id="scards"></div>
  <div id="gc"></div>
  <div class="no-res" id="no-res" style="display:none">Keine Ergebnisse.</div>
</div>

const YEARS=DATA.years;
const YMS=DATA.yearmonths;
let activePeriod='all';
let sortState={};
let openGroups={};

const MNAME={'01':'Jan','02':'Feb','03':'Mär','04':'Apr','05':'Mai','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Okt','11':'Nov','12':'Dez'};
function ymLabel(ym){const[y,m]=ym.split('-');return MNAME[m]+' '+y;}

function fmt(n,d=0){if(n==null||isNaN(n)||n===0&&d===0)return n===0?'0':'–';return Number(n).toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtE(n){return fmt(n,2)+'\u00a0€'}

function getSpend(a){
  if(activePeriod==='all') return a.spend;
  if(YEARS.includes(activePeriod)){
    const yd=a.years&&a.years[activePeriod];
    return yd?yd.spend:0;
  }
  // month: no per-article monthly data - show all
  return a.spend;
}
function getKg(a){
  if(activePeriod==='all') return a.kg;
  if(YEARS.includes(activePeriod)){
    const yd=a.years&&a.years[activePeriod];
    return yd?yd.kg:0;
  }
  return a.kg;
}
function getGruppeSpend(g){
  if(activePeriod==='all') return g.total_spend;
  if(YEARS.includes(activePeriod)){
    let s=0;
    g.articles.forEach(a=>{const yd=a.years&&a.years[activePeriod];if(yd)s+=yd.spend;});
    return s;
  }
  // month
  const md=g.months&&g.months[activePeriod];
  return md?md.spend:0;
}
function getGruppeKg(g){
  if(activePeriod==='all') return g.total_kg;
  if(YEARS.includes(activePeriod)){
    let s=0;
    g.articles.forEach(a=>{const yd=a.years&&a.years[activePeriod];if(yd)s+=yd.kg;});
    return s;
  }
  const md=g.months&&g.months[activePeriod];
  return md?md.kg:0;
}
function getTotalMonths(){
  if(activePeriod==='all') return YMS.length;
  if(YEARS.includes(activePeriod)) return 12;
  return 1;
}

  const c=document.getElementById('period-btns');
  c.innerHTML='';
  function addBtn(label,val){
    const b=document.createElement('button');
    b.className='pbtn'+(val===activePeriod?' active':'');
    b.textContent=label; b.dataset.val=val;
    b.onclick=()=>setPeriod(val);
    c.appendChild(b);
  }
  addBtn('Gesamt','all');
  YEARS.forEach(y=>addBtn(y,y));
  // Group months by year for readability
  let lastYear='';
  YMS.forEach(ym=>{
    const[y,m]=ym.split('-');
    if(y!==lastYear){lastYear=y;} 
    addBtn(MNAME[m]+"'"+y.slice(2),ym);
  });
}

function setPeriod(val){
  activePeriod=val;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('active',b.dataset.val===val));
  applyFilters();
}

function updateSummary(fg){
  let totalSpend=0,totalKg=0,totalArticles=0,totalBio=0,totalVegan=0;
  fg.forEach(g=>{
    totalSpend+=getGruppeSpend(g);
    totalKg+=getGruppeKg(g);
    totalArticles+=g.articles.length;
    g.articles.forEach(a=>{if(a.bio)totalBio++;if(a.vegan)totalVegan++;});
  });
  const months=getTotalMonths();
  const label=activePeriod==='all'?'Gesamt':YEARS.includes(activePeriod)?activePeriod:ymLabel(activePeriod);
  document.getElementById('stats-top').textContent=
    totalArticles+' Artikel · '+fg.filter(g=>g.articles.length>0).length+' Gruppen · '+fmtE(totalSpend);
  document.getElementById('scards').innerHTML=`
    <div class="sc"><div class="lbl">Ausgaben</div><div class="val">${fmtE(totalSpend)}</div><div class="sub">${label}</div></div>
    <div class="sc"><div class="lbl">∅ pro Monat</div><div class="val">${fmtE(totalSpend/months)}</div><div class="sub">über ${months} Mon.</div></div>
    <div class="sc"><div class="lbl">Volumen (kg)</div><div class="val">${fmt(totalKg,0)}</div><div class="sub">${label}</div></div>
    <div class="sc"><div class="lbl">Artikel</div><div class="val">${totalArticles}</div><div class="sub">${fg.filter(g=>g.articles.length>0).length} Gruppen</div></div>
    <div class="sc"><div class="lbl">Bio</div><div class="val">${totalBio}</div><div class="sub">Artikel</div></div>
    <div class="sc"><div class="lbl">Vegan</div><div class="val">${totalVegan}</div><div class="sub">Artikel</div></div>
  `;
}

function buildGroups(fg){
  const gc=document.getElementById('gc');
  gc.innerHTML='';
  let vis=0;
  fg.forEach(g=>{
    if(!g.articles.length)return;
    vis+=g.articles.length;
    const key=g.gruppe;
    const isOpen=openGroups[key]!==false;
    const gSpend=getGruppeSpend(g);
    const gKg=getGruppeKg(g);
    const block=document.createElement('div');
    block.className='group-block';
    block.innerHTML=`
      <div class="gh" onclick="toggleGroup(${JSON.stringify(key)},this)">
        <span class="gt${isOpen?' open':''}">&#9654;</span>
        <span class="gname">${g.gruppe}</span>
        <span class="gbadge">${g.articles.length}</span>
        <span class="gmeta">${fmt(gKg,0)}\u00a0kg\u00a0·\u00a0${fmtE(gSpend)}</span>
      </div>
      <div class="gb${isOpen?' open':''}">
        ${buildTable(key,g.articles)}
      </div>`;
    gc.appendChild(block);
  });
  document.getElementById('no-res').style.display=vis===0?'block':'none';
}

function buildTable(key,articles){
  const s=sortState[key]||{col:'spend',dir:-1};
  const months=getTotalMonths();
  const sorted=[...articles].sort((a,b)=>{
    if(s.col==='name') return s.dir*a.name.localeCompare(b.name,'de');
    if(s.col==='spend') return s.dir*(getSpend(a)-getSpend(b));
    if(s.col==='kg') return s.dir*(getKg(a)-getKg(b));
    return s.dir*((a[s.col]??0)-(b[s.col]??0));
  });
  function th(col,lbl,cls=''){
    const isSorted=s.col===col;
    const arr=isSorted?(s.dir>0?'▲':'▼'):'';
    return`<th class="s${cls?' '+cls:''}${isSorted?' sorted':''}" onclick="sortTable(${JSON.stringify(key)},'${col}')">${lbl}${arr?`<span class="sa">${arr}</span>`:''}</th>`;
  }
  const periodLabel=activePeriod==='all'?'Gesamt':YEARS.includes(activePeriod)?activePeriod:ymLabel(activePeriod);
  const rows=sorted.map(a=>{
    const sp=getSpend(a), kg=getKg(a);
    const badges=[];
    if(a.bio)badges.push('<span class="b bio">Bio</span>');
    if(a.vegan)badges.push('<span class="b vegan">Vegan</span>');
    else if(a.veg)badges.push('<span class="b veg">Veg.</span>');
    const rc=a.bio?'br':a.vegan?'van':a.veg?'ve':'';
    return`<tr${rc?' class="'+rc+'"':''}>
      <td style="width:36%" title="${a.name}">${a.name}</td>
      <td class="r" style="width:15%">${fmtE(sp)}</td>
      <td class="r" style="width:13%">${fmt(kg,1)}\u00a0kg</td>
      <td class="r" style="width:13%">${fmtE(sp/months)}</td>
      <td class="r" style="width:8%">${a.n}</td>
      <td style="width:15%">${badges.length?'<div class="badges">'+badges.join('')+'</div>':''}</td>
    </tr>`;
  }).join('');
  return`<table>
    <thead><tr>
      ${th('name','Artikel')}
      ${th('spend','Ausgaben ('+periodLabel+')','r')}
      ${th('kg','Menge (kg)','r')}
      <th class="r">∅/Monat</th>
      <th class="r">Buchungen</th>
      <th>Labels</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function toggleGroup(key,h){
  const wasOpen=openGroups[key]!==false;
  openGroups[key]=!wasOpen;
  const isNowOpen=!wasOpen;
  h.querySelector('.gt').classList.toggle('open',isNowOpen);
  h.nextElementSibling.classList.toggle('open',isNowOpen);
}

function sortTable(key,col){
  const s=sortState[key]||{col:'spend',dir:-1};
  sortState[key]=s.col===col?{col,dir:-s.dir}:{col,dir:-1};
  openGroups[key]=true;
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const onlyBio=document.getElementById('f-bio').checked;
  const onlyVegan=document.getElementById('f-vegan').checked;
  const onlyVeg=document.getElementById('f-veg').checked;
  const filtered=DATA.groups.map(g=>({
    ...g,
    articles:g.articles.filter(a=>{
      if(onlyBio&&!a.bio) return false;
      if(onlyVegan&&!a.vegan) return false;
      if(onlyVeg&&!a.veg&&!a.vegan) return false;
      if(activePeriod!=='all'&&YEARS.includes(activePeriod)){
        const yd=a.years[activePeriod];
        if(!yd||yd.spend===0) return false;
      }
      if(activePeriod!=='all'&&!YEARS.includes(activePeriod)){
        const md=g.months&&g.months[activePeriod];
        if(!md||md.spend===0) return false;
      }
      if(q&&!a.name.toLowerCase().includes(q)&&!g.gruppe.toLowerCase().includes(q)) return false;
      return true;
    })
  }));
  updateSummary(filtered);
  buildGroups(filtered);
}

buildPeriodBtns();
applyFilters();
</script>
</body>
</html>
