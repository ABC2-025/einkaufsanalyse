<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bestellanalyse Necta</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f4f8;color:#1a2332}
.topbar{background:#1F4E79;color:#fff;padding:9px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar h1{font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,.25);flex-shrink:0}
.search-wrap{flex:1;min-width:120px;max-width:220px}
.search-wrap input{width:100%;padding:4px 9px;border-radius:5px;border:none;font-size:12px;outline:none}
.period-btns{display:flex;gap:2px;flex-wrap:wrap}
.pbtn{padding:3px 8px;border-radius:4px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .12s}
.pbtn:hover{background:rgba(255,255,255,.15)}
.pbtn.active{background:#fff;color:#1F4E79;border-color:#fff}
.chk-group{display:flex;gap:3px;flex-wrap:wrap}
.chk-group label{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.1);border-radius:4px;padding:3px 7px;border:1px solid rgba(255,255,255,.2)}
.chk-group label:hover{background:rgba(255,255,255,.2)}
/* Comparison panel */
.cmp-bar{background:#0D3352;color:#fff;border-bottom:2px solid #2E75B6;padding:8px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-height:40px}
.cmp-bar .cmp-title{font-size:11px;font-weight:700;opacity:.7;white-space:nowrap}
.cmp-stats{display:flex;gap:16px;flex:1;flex-wrap:wrap}
.cmp-stat{font-size:12px;white-space:nowrap}
.cmp-stat strong{font-weight:700}
.cmp-stat.green{color:#6fcf6f}
.cmp-stat.red{color:#ff8080}
.cmp-btn{padding:4px 12px;border-radius:4px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.cmp-btn:hover{background:rgba(255,255,255,.15)}
.container{padding:10px 14px;max-width:1600px;margin:0 auto}
.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:7px;margin-bottom:10px}
.sc{background:#fff;border-radius:7px;padding:8px 11px;border:1px solid #dbe4ee}
.sc .lbl{font-size:10px;color:#607080;margin-bottom:1px}
.sc .val{font-size:16px;font-weight:700;color:#1F4E79;line-height:1.2}
.sc .sub{font-size:10px;color:#8a9ab0;margin-top:1px}
.group-block{background:#fff;border-radius:7px;margin-bottom:6px;border:1px solid #dbe4ee;overflow:hidden}
.gh{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#2E75B6;color:#fff;cursor:pointer;user-select:none}
.gh:hover{background:#1F4E79}
.gt{font-size:11px;transition:transform .15s;flex-shrink:0}
.gt.open{transform:rotate(90deg)}
.gname{font-weight:700;font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gbadge{background:rgba(255,255,255,.2);border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700;flex-shrink:0}
.gmeta{font-size:11px;opacity:.85;white-space:nowrap;flex-shrink:0}
.gb{display:none}
.gb.open{display:block}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{background:#EBF3FB;font-size:10px;font-weight:700;color:#1F4E79;padding:5px 5px;text-align:left;border-bottom:2px solid #B8CCE4;white-space:nowrap;overflow:hidden}
thead th.r{text-align:right}
thead th.c{text-align:center}
thead th.s{cursor:pointer}
thead th.s:hover{background:#D6E8F8}
thead th.sorted{background:#C2D9F0}
.sa{font-size:8px;margin-left:1px;opacity:.65}
.col-sep{border-left:2px solid #B8CCE4 !important}
tbody tr{border-bottom:1px solid #f0f4f8}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f2f7ff}
tbody tr.checked-row{background:#fffbe6 !important}
td{padding:4px 5px;font-size:11px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.r{text-align:right;font-variant-numeric:tabular-nums}
td.c{text-align:center}
.badges{display:flex;gap:2px;flex-wrap:nowrap}
.b{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:700}
.b.bio{background:#d4edda;color:#155724}
.b.vegan{background:#fff3cd;color:#856404}
.b.veg{background:#cce5ff;color:#004085}
.b.both{background:#c3e6cb;color:#155724}
.pct{font-size:10px;padding:1px 4px;border-radius:3px;font-weight:700}
.pct.pos{background:#fde8e8;color:#a00}
.pct.neg{background:#e8f5e9;color:#1a6b1a}
.pct.zero{background:#eee;color:#666}
.chk-cell{width:28px;text-align:center}
input[type=checkbox]{cursor:pointer;width:13px;height:13px}
.no-res{text-align:center;padding:36px;color:#607080}
.hint{font-size:10px;opacity:.6;font-style:italic}
.bio-tag{font-size:9px;color:#155724;background:#d4edda;border-radius:3px;padding:1px 3px;margin-left:3px}
.conv-tag{font-size:9px;color:#4a4a00;background:#f5f0d0;border-radius:3px;padding:1px 3px;margin-left:3px}
</style>
</head>

<div class="topbar">
  <h1>Bestellanalyse Necta</h1>

</div>

<div class="cmp-bar" id="cmp-bar">

</div>

const MNAME={'01':'Jan','02':'Feb','03':'Mär','04':'Apr','05':'Mai','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Okt','11':'Nov','12':'Dez'};
function ymLabel(ym){const[y,m]=ym.split('-');return MNAME[m]+"'"+y.slice(2);}
function fmt(n,d=0){if(n==null||isNaN(n))return'–';return Number(n).toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtE(n){if(n==null||isNaN(n))return'–';return fmt(n,2)+' €'}
function pctStr(bio,conv){
  if(!bio||!conv)return null;
  const p=((bio-conv)/conv*100);
  return {val:p,str:(p>0?'+':'')+p.toFixed(1)+'%',cls:p>0?'pos':p<0?'neg':'zero'};
}

function getSpend(a){
  if(activePeriod==='all')return a.spend;
  if(YEARS.includes(activePeriod)){const yd=a.years[activePeriod];return yd?yd.spend:0;}
  return a.spend;
}
function getKg(a){
  if(activePeriod==='all')return a.kg;
  if(YEARS.includes(activePeriod)){const yd=a.years[activePeriod];return yd?yd.kg:0;}
  return a.kg;
}
function getGruppeSpend(g){
  if(activePeriod==='all')return g.total_spend;
  if(YEARS.includes(activePeriod)){return g.articles.reduce((s,a)=>{const yd=a.years[activePeriod];return s+(yd?yd.spend:0);},0);}
  const md=g.months&&g.months[activePeriod];return md?md.spend:0;
}
function getTotalMonths(){
  if(activePeriod==='all')return YMS.length;
  if(YEARS.includes(activePeriod))return 12;
  return 1;
}

function buildPeriodBtns(){
  const c=document.getElementById('period-btns');
  function addBtn(label,val){
    const b=document.createElement('button');
    b.className='pbtn'+(val===activePeriod?' active':'');
    b.textContent=label;b.dataset.val=val;
    b.onclick=()=>setPeriod(val);
    c.appendChild(b);
  }
  addBtn('Gesamt','all');
  YEARS.forEach(y=>addBtn(y,y));
  YMS.forEach(ym=>addBtn(ymLabel(ym),ym));
}

function setPeriod(val){
  activePeriod=val;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('active',b.dataset.val===val));
  applyFilters();
}

function updateComparison(){
  const stats=document.getElementById('cmp-stats');
  if(checkedArticles.size===0){
    stats.innerHTML='<span style="font-size:11px;opacity:.6">Artikel anhaken um Vergleich zu sehen...</span>';
    return;
  }
  let totalSpend=0,allConvCost=0,allBioCost=0,hasBio=0,hasConv=0;
  DATA.groups.forEach(g=>g.articles.forEach(a=>{
    if(!checkedArticles.has(a.name))return;
    totalSpend+=a.spend;
    if(a.all_conv_cost!=null){allConvCost+=a.all_conv_cost;hasConv++;}
    if(a.all_bio_cost!=null){allBioCost+=a.all_bio_cost;hasBio++;}
  }));
  const bioVsConvPct=allConvCost>0?((allBioCost-allConvCost)/allConvCost*100):null;
  const bioVsActPct=totalSpend>0?((allBioCost-totalSpend)/totalSpend*100):null;
  const convVsActPct=totalSpend>0?((allConvCost-totalSpend)/totalSpend*100):null;
  function pctBadge(val){
    if(val==null)return'';
    const cls=val>0?'red':'green';
    return`<span style="color:${cls==='red'?'#ff9090':'#6fcf6f'};font-weight:700">${val>0?'+':''}${val.toFixed(1)}%</span>`;
  }
  stats.innerHTML=`
    <span class="cmp-stat"><strong>${checkedArticles.size}</strong> Artikel ausgewählt</span>
    <span class="cmp-stat">Ist (gemischt): <strong>${fmtE(totalSpend)}</strong></span>
    ${hasConv>0?`<span class="cmp-stat">100% Konventionell: <strong>${fmtE(allConvCost)}</strong> ${pctBadge(convVsActPct)} vs. Ist</span>`:''}
    ${hasBio>0?`<span class="cmp-stat">100% Bio: <strong>${fmtE(allBioCost)}</strong> ${pctBadge(bioVsActPct)} vs. Ist</span>`:''}
    ${hasBio>0&&hasConv>0?`<span class="cmp-stat">Bio vs. Konv.: ${pctBadge(bioVsConvPct)}</span>`:''}
  `;
}

function clearAll(){
  checkedArticles.clear();
  document.querySelectorAll('input.art-chk').forEach(cb=>cb.checked=false);
  document.querySelectorAll('tr.checked-row').forEach(tr=>tr.classList.remove('checked-row'));
  updateComparison();
}

function toggleCheck(name,cb){
  if(cb.checked)checkedArticles.add(name);
  else checkedArticles.delete(name);
  const tr=cb.closest('tr');
  if(tr)tr.classList.toggle('checked-row',cb.checked);
  updateComparison();
}

function updateSummary(fg){
  let ts=0,tk=0,ta=0,tbio=0,tpairs=0;
  fg.forEach(g=>{
    ts+=getGruppeSpend(g);
    tk+=g.total_kg;
    ta+=g.articles.length;
    g.articles.forEach(a=>{
      if(a.bio_pp&&a.conv_pp)tpairs++;
      else if(a.bio_pp)tbio++;
    });
  });
  const months=getTotalMonths();
  const label=activePeriod==='all'?'Gesamt':YEARS.includes(activePeriod)?activePeriod:ymLabel(activePeriod);
  document.getElementById('stats-top').textContent=`${ta} Artikel · ${fg.filter(g=>g.articles.length>0).length} Gruppen`;
  document.getElementById('scards').innerHTML=`
    <div class="sc"><div class="lbl">Ausgaben</div><div class="val">${fmtE(ts)}</div><div class="sub">${label}</div></div>
    <div class="sc"><div class="lbl">∅ / Monat</div><div class="val">${fmtE(ts/months)}</div><div class="sub">${months} Mon.</div></div>
    <div class="sc"><div class="lbl">Artikel gesamt</div><div class="val">${ta}</div><div class="sub">${fg.filter(g=>g.articles.length>0).length} Gruppen</div></div>
    <div class="sc"><div class="lbl">Bio+Konv-Paare</div><div class="val">${tpairs}</div><div class="sub">Vergleichbar</div></div>
    <div class="sc"><div class="lbl">Nur Bio</div><div class="val">${tbio}</div><div class="sub">kein Konv-Preis</div></div>
    <div class="sc"><div class="lbl">Ausgewählt</div><div class="val">${checkedArticles.size}</div><div class="sub">für Vergleich</div></div>
  `;
}

function buildGroups(fg){
  const gc=document.getElementById('gc');
  gc.innerHTML='';
  let vis=0;
  fg.forEach(g=>{
    if(!g.articles.length)return;
    vis+=g.articles.length;
    const key=g.gruppe;
    const isOpen=openGroups[key]!==false;
    const gSpend=getGruppeSpend(g);
    const block=document.createElement('div');
    block.className='group-block';
    block.innerHTML=`
      <div class="gh" onclick="toggleGroup(${JSON.stringify(key)},this)">
        <span class="gt${isOpen?' open':''}">&#9654;</span>
        <span class="gname">${g.gruppe}</span>
        <span class="gbadge">${g.articles.length}</span>
        <span class="gmeta">${fmt(g.total_kg,0)} kg · ${fmtE(gSpend)}</span>
      </div>
      <div class="gb${isOpen?' open':''}">
        ${buildTable(key,g.articles)}
      </div>`;
    gc.appendChild(block);
  });
  document.getElementById('no-res').style.display=vis===0?'block':'none';
}

function buildTable(key,articles){
  const s=sortState[key]||{col:'spend',dir:-1};
  const months=getTotalMonths();
  const sorted=[...articles].sort((a,b)=>{
    if(s.col==='name')return s.dir*a.name.localeCompare(b.name,'de');
    if(s.col==='spend')return s.dir*(getSpend(a)-getSpend(b));
    if(s.col==='kg')return s.dir*(getKg(a)-getKg(b));
    if(s.col==='conv_pp')return s.dir*((a.conv_pp??999)-(b.conv_pp??999));
    if(s.col==='bio_pp')return s.dir*((a.bio_pp??999)-(b.bio_pp??999));
    return s.dir*((a[s.col]??0)-(b[s.col]??0));
  });

  function th(col,lbl,cls=''){
    const isSorted=s.col===col;
    const arr=isSorted?(s.dir>0?'▲':'▼'):'';
    return`<th class="s${cls?' '+cls:''}${isSorted?' sorted':''}" onclick="sortTable(${JSON.stringify(key)},'${col}')">${lbl}${arr?`<span class="sa">${arr}</span>`:''}</th>`;
  }

  const rows=sorted.map(a=>{
    const sp=getSpend(a),kg=getKg(a);
    const isChecked=checkedArticles.has(a.name);
    const hasBoth=a.bio_pp!=null&&a.conv_pp!=null;
    const pct=hasBoth?pctStr(a.bio_pp,a.conv_pp):null;

    // Labels
    const badges=[];
    if(a.bio_pp&&a.conv_pp)badges.push('<span class="b both">Bio+Konv</span>');
    else if(a.bio_pp)badges.push('<span class="b bio">Bio</span>');
    if(a.vegan)badges.push('<span class="b vegan">Vegan</span>');
    else if(a.veg)badges.push('<span class="b veg">Veg.</span>');

    // Hypothetical costs
    const allConvStr=a.all_conv_cost!=null?fmtE(a.all_conv_cost):'–';
    const allBioStr=a.all_bio_cost!=null?fmtE(a.all_bio_cost):'–';
    const pctStr2=pct?`<span class="pct ${pct.cls}">${pct.str}</span>`:'–';

    const rc=isChecked?'checked-row':'';
    return`<tr class="${rc}">
      <td class="chk-cell c"><input type="checkbox" class="art-chk" ${isChecked?'checked':''} onchange="toggleCheck(${JSON.stringify(a.name)},this)"></td>
      <td style="width:25%" title="${a.name}">${a.name}</td>
      <td class="r" style="width:10%">${fmtE(sp)}</td>
      <td class="r" style="width:8%">${fmt(kg,0)} kg</td>
      <td class="r" style="width:8%">${a.conv_pp!=null?fmtE(a.conv_pp)+'/kg':'–'}</td>
      <td class="r" style="width:8%">${a.bio_pp!=null?fmtE(a.bio_pp)+'/kg':'–'}</td>
      <td class="r col-sep" style="width:10%">${allConvStr}</td>
      <td class="r" style="width:10%">${allBioStr}</td>
      <td class="r c" style="width:7%">${pctStr2}</td>
      <td style="width:9%">${badges.length?'<div class="badges">'+badges.join('')+'</div>':''}</td>
    </tr>`;
  }).join('');

  return`<table>
    <thead>
      <tr>
        <th class="chk-cell c" title="Alle in Gruppe"><input type="checkbox" onchange="toggleGroup_chk(${JSON.stringify(key)},this)"></th>
        ${th('name','Artikel')}
        ${th('spend','Ausgaben','r')}
        ${th('kg','Menge','r')}
        ${th('conv_pp','∅ Konv./kg','r')}
        ${th('bio_pp','∅ Bio/kg','r')}
        <th class="r col-sep">100% Konv.</th>
        <th class="r">100% Bio</th>
        <th class="c">Bio vs Konv</th>
        <th>Labels</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function toggleGroup_chk(key,cb){
  DATA.groups.forEach(g=>{
    if(g.gruppe!==key)return;
    g.articles.forEach(a=>{
      if(cb.checked)checkedArticles.add(a.name);
      else checkedArticles.delete(a.name);
    });
  });
  // Re-render all checkboxes in this group
  applyFilters();
}

function toggleGroup(key,h){
  const wasOpen=openGroups[key]!==false;
  openGroups[key]=!wasOpen;
  h.querySelector('.gt').classList.toggle('open',!wasOpen);
  h.nextElementSibling.classList.toggle('open',!wasOpen);
}

function sortTable(key,col){
  const s=sortState[key]||{col:'spend',dir:-1};
  sortState[key]=s.col===col?{col,dir:-s.dir}:{col,dir:-1};
  openGroups[key]=true;
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const onlyBio=document.getElementById('f-bio').checked;
  const onlyConv=document.getElementById('f-conv').checked;
  const onlyBoth=document.getElementById('f-both').checked;
  const onlyVegan=document.getElementById('f-vegan').checked;
  const filtered=DATA.groups.map(g=>({
    ...g,
    articles:g.articles.filter(a=>{
      if(onlyBio&&!a.bio_pp)return false;
      if(onlyConv&&!a.conv_pp)return false;
      if(onlyBoth&&!(a.bio_pp&&a.conv_pp))return false;
      if(onlyVegan&&!a.vegan)return false;
      if(activePeriod!=='all'&&YEARS.includes(activePeriod)){
        const yd=a.years[activePeriod];if(!yd||yd.spend===0)return false;
      }
      if(q&&!a.name.toLowerCase().includes(q)&&!g.gruppe.toLowerCase().includes(q))return false;
      return true;
    })
  }));
  updateSummary(filtered);
  buildGroups(filtered);
  updateComparison();
}

buildPeriodBtns();
applyFilters();
</script>
</body>
</html>
